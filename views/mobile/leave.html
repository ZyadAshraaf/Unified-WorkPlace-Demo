<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#198D87">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="/unifiedwp/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/unifiedwp/assets/logo.png">
  <title>Leave Request — Unified Workspace</title>
  <link rel="stylesheet" href="/unifiedwp/theme.css">
  <link rel="stylesheet" href="/unifiedwp/mobile/css/mobile.css">
</head>
<body>
<div class="m-page m-page--no-tabs">
  <div class="m-header m-header--back">
    <a href="/unifiedwp/m/services">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </a>
    <div>
      <h1>Leave Request</h1>
      <div class="m-header__sub">Submit a new leave application</div>
    </div>
  </div>

  <div class="m-content">
    <form class="m-form" id="leaveForm">

      <div class="form-group">
        <label for="leaveType">Leave Type</label>
        <select id="leaveType" class="form-control" required>
          <option value="">Select type…</option>
          <option value="annual">Annual Leave</option>
          <option value="sick">Sick Leave</option>
          <option value="emergency">Emergency Leave</option>
          <option value="maternity">Maternity Leave</option>
          <option value="marriage">Marriage Leave</option>
          <option value="hajj">Hajj Leave</option>
          <option value="exam">Exam / Study Leave</option>
        </select>
      </div>

      <div class="form-group">
        <label for="startDate">Start Date</label>
        <input type="date" id="startDate" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="endDate">End Date</label>
        <input type="date" id="endDate" class="form-control" required>
      </div>

      <div class="form-group">
        <label>Duration</label>
        <div class="form-control" id="daysDisplay" style="background:#f8fafc;color:#64748b;">Select dates above</div>
      </div>

      <!-- Custom fields injected here based on leave type -->
      <div id="leaveCustomFields"></div>

      <div class="form-group">
        <label for="reason">Reason</label>
        <textarea id="reason" class="form-control" rows="4" placeholder="Briefly describe the reason for your leave…"></textarea>
      </div>

      <button type="submit" class="btn btn--primary btn--full" id="submitBtn">Submit Request</button>
    </form>
  </div>
</div>

<script src="/unifiedwp/mobile/js/api.js"></script>
<script src="/unifiedwp/mobile/js/leave.js"></script>
</body>
</html>
