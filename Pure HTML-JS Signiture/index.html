<head>
  <script src="index.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.6.347/pdf.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.6.347/pdf_viewer.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.6.347/pdf_viewer.css" />

  <link rel="stylesheet" href="app.css" />
  <script>
    const { degrees, PDFDocument, rgb, StandardFonts } = PDFLib
    var signaturePad;
    var PDFContentBase64;
    var PDFFileName;
    var setCoordinates = false;
    var currentPageIndex = 0;
    var totalPagesCount = 0;

    $(function () {
      console.log("ready!");

      // Draw Signiture Pad Canvas
      drawCanvas();

      // Color Picker
      var colorPicker = document.getElementById("colorPicker")
      colorPicker.addEventListener('input', function (e) {
        console.log(this.value);

        const red = parseInt(this.value.substring(1, 3), 16);
        const green = parseInt(this.value.substring(3, 5), 16);
        const blue = parseInt(this.value.substring(5, 7), 16);
        updatePenColor(`rgb(${red},${green},${blue})`);
      });

      // file Picker
      var filePicker = document.getElementById("filePicker");
      filePicker.addEventListener('change', function (e) {
        if (e.target.files[0]) {
          parseAttachmentFile(e.target.files).then(res => {
            PDFContentBase64 = res.fileContent;
            PDFFileName = res.fileName;
            document.getElementById("fileName").innerHTML = res.fileName
            showPDF(res.fileContent);
            document.getElementById("fileOperations").style.display = "block";
            document.getElementById("app").style.display = "flex";

            prepareSelectPageArray(PDFContentBase64).then(res => {
              var selectPageOptions = res;
              var selectPages = document.getElementById("pages")

              selectPages.innerHTML = selectPageOptions;

            });

          });
        }
      });
    });

    // draw Signiture canvas
    function drawCanvas() {
      var canvas = document.getElementById("canvas");

      signaturePad = new SignaturePad(canvas, {
        penColor: 'rgb(0, 0, 0)'
      });
    };

    // draw Signiture Pen Color
    function updatePenColor(color) {
      var canvas = document.getElementById("canvas");
      var context = canvas.getContext('2d');
      context.save();
      context.fillStyle = color;
      context.globalCompositeOperation = 'source-in';
      context.fillRect(0, 0, canvas.width, canvas.height);
      context.restore();

      console.log(signaturePad.penColor);
      console.log(color);

      signaturePad.penColor = color // `rgb(${color._r},${color._g},${color._b})`;

      console.log(signaturePad.penColor);

    };

    // add Signiture to pdf permanently
    async function addSignitureToPDF() {

      const existingPdfBytes = convertDataURIToBinary(PDFContentBase64); // await fetch(pdfFile).then(res => res.arrayBuffer());
      const pdfDoc = await PDFDocument.load(existingPdfBytes);

      var pngUrl = signaturePad.toDataURL("image/png");
      const pngImageBytes = await fetch(pngUrl).then((res) => res.arrayBuffer());
      const pngImage = await pdfDoc.embedPng(pngImageBytes);

      const pngDims = pngImage.scale(1);


      var left = $("#signitureImg").css("left");
      var top = $("#signitureImg").css("top");

      console.log("LEFT: ", left);
      console.log("TOP: ", top);


      var selectedPages = document.getElementById('pages').value;

      console.log(selectedPages);
      console.log(typeof selectedPages)

      if (selectedPages.includes('all') || selectedPages.length == 0) {
        pdfDoc.getPages().forEach(page => {

          page.drawImage(pngImage, {
            x: left ? parseInt(left.slice(0, -2)) : 0,
            y: top ? (page.getHeight() - parseInt(top.slice(0, -2))) - pngDims.height : 0, // page.getHeight() -
            width: pngDims.width,
            height: pngDims.height,
            rotate: degrees(0),
            opacity: 0.75,
          });
        });

      } else {
        var index = 0;
        pdfDoc.getPages().forEach(page => {
          if (selectedPages.includes(String(index))) {
            console.log("index");
            console.log(index);
            console.log("selectedPages");
            console.log(selectedPages);
            // console.log(page);
            page.drawImage(pngImage, {
              x: left ? parseInt(left.slice(0, -2)) : 75,
              y: top ? (page.getHeight() - parseInt(top.slice(0, -2))) - pngDims.height : 25, // page.getHeight() -
              width: pngDims.width,
              height: pngDims.height,
              rotate: degrees(0),
              opacity: 0.75,
            });
          }
          index++;

        });

      }
      const pdfBase64 = await pdfDoc.saveAsBase64({
        dataUri: true
      });

      showPDF(pdfBase64);
      PDFContentBase64 = pdfBase64;
      return pdfBase64;
    };

    // add Signiture Coordinates in PDF
    function setSignitureCoordinates(pageCanvasId) {

      var pngUrl = signaturePad.toDataURL("image/png");

      var img = document.createElement('img');
      img.id = 'signitureImg';
      img.src = pngUrl;
      img.style.border = "1px solid black";
      img.style.borderRadius = "25px";
      img.style.position = "absolute";
      // img.style.top = 0;

      var pageCanvas = document.getElementById("page-0-div");

      const rect = pageCanvas.getBoundingClientRect();
      img.style.left = 0; //Math.ceil(rect.x);

      console.log(rect);
      console.log(rect.x);

      img.addEventListener("mousedown", function () {
        console.log("mouseDown");
        setCoordinates = true;
      }, false);

      img.addEventListener("mouseup", function () {
        console.log("mouseUp Img");
        setCoordinates = false;
      }, false);


      pageCanvas.appendChild(img);


      $("#page-0-canvas").mouseup(function () {
        console.log("mouseUp Window");
        setCoordinates = false;
      });


      $("#page-0-canvas").mousemove(function (event) {

        if (setCoordinates) {
          console.log("mouseMove");

          const x = (event.clientX - $("#page-0-div").offset().left) + $(window).scrollLeft();
          const y = (event.clientY - $("#page-0-div").offset().top) + $(window).scrollTop();

          console.log("x: " + x + " y: " + y);

          var img = document.getElementById("signitureImg");
          var imgRect = img.getBoundingClientRect();

          if (y + img.height < rect.bottom && x + img.width < rect.right) {
            console.log("PASS");
            // $("#signitureImg").css({ "position": "absolute", "left": left + event.movementX, "top": top + event.movementY });
            $("#signitureImg").css({
              "position": "absolute",
              "left": x,
              "top": y
            });
          } else if (imgRect.bottom < rect.bottom && imgRect.right >= rect.right) {
            $("#signitureImg").css({
              "position": "absolute",
              "left": x,
              "top": rect.bottom
            });

          } else if (imgRect.bottom >= rect.bottom && imgRect.right < rect.right) {
            $("#signitureImg").css({
              "position": "absolute",
              "left": rect.right,
              "top": y
            });

          }
        }
      });

    };

    // build pdf previewer
    function showPDF(base64PDF) {
      currentPageIndex = 0;

      totalPagesCount = 0;
      var viewportDiv = document.getElementById('viewport');
      // var pdfArray = convertDataURIToBinary(base64PDF)
      pdfjsLib.getDocument(base64PDF).promise.then(function (pdf) {

        // Support HiDPI-screens.
        var outputScale = window.devicePixelRatio || 1;

        const renderPagesPromises = [];
        for (let i = 0; i < pdf.numPages; i++) {
          renderPagesPromises.push(pdf.getPage(i + 1));
        }

        var pagesHTML = "";
        for (var tempIndex = 0; tempIndex < pdf.numPages; tempIndex++) {
          pagesHTML += `<div><div id="page-${tempIndex}-div" style="position:relative;display: inline-block;"><canvas id="page-${tempIndex}-canvas"></canvas></div></div>`;
        }
        console.log(pagesHTML);
        viewportDiv.innerHTML = pagesHTML;

        Promise.all(renderPagesPromises).then(pages => {

          pages.forEach((page, index) => {

            var pdfViewport = page.getViewport({
              scale: 1,
            });

            const container = viewportDiv.children[index].children[0];

            // console.log(container);

            const canvas = container.children[0];

            // canvas.addEventListener();

            const context = canvas.getContext("2d");

            canvas.width = Math.floor(pdfViewport.width * outputScale);
            canvas.height = Math.floor(pdfViewport.height * outputScale);
            canvas.style.width = Math.floor(pdfViewport.width) + "px";
            canvas.style.height = Math.floor(pdfViewport.height) + "px";

            container.width = Math.floor(pdfViewport.width * outputScale);
            container.height = Math.floor(pdfViewport.height * outputScale);
            container.style.width = Math.floor(pdfViewport.width) + "px";
            container.style.height = Math.floor(pdfViewport.height) + "px";

            var transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] :
              null;

            var renderContext = {
              canvasContext: context,
              transform: transform,
              viewport: pdfViewport
            };
            page.render(renderContext);


          });

        });

      });

    };

    // generate select pages options based on number of pages of pdf
    async function prepareSelectPageArray(pdfFile) {
      var optionsArray = '';
      const existingPdfBytes = convertDataURIToBinary(pdfFile); // await fetch(pdfFile).then(res => res.arrayBuffer());
      const pdfDoc = await PDFDocument.load(existingPdfBytes);

      console.log(pdfDoc.getPages().length);
      for (var i = 0; i < pdfDoc.getPages().length; i++) {
        optionsArray += `<option value="${i}">${i + 1}</option>`
      }

      optionsArray += `<option value="all">All<option>`

      console.log(optionsArray);
      return optionsArray;
    }

    function parseAttachmentFile(fileSet) {
      var readDataPromise = new Promise(function (resolve) {
        var blobURL;
        var fileName;
        var fileType;
        if (fileSet.length > 0) {
          //Grab the first (and only) file
          var imageFile = fileSet[0];
          var r = new FileReader();
          r.onload = function (e) {
            var base64Img = e.target.result;
            fileName = imageFile.name;
            var fileObject = {
              fileName: fileName,
              fileType: imageFile.type ? imageFile.type : fileType,
              fileSize: imageFile.size,
              fileContent: base64Img
            };
            resolve(fileObject);
          };
          r.readAsDataURL(imageFile);
        }
      });
      return readDataPromise;
    };

    // convert base64  to binary array 
    function convertDataURIToBinary(dataURI) {
      var BASE64_MARKER = ';base64,';
      console.log(typeof dataURI);
      console.log(dataURI);
      console.log(String(dataURI));
      var base64Index = dataURI.indexOf(BASE64_MARKER) + BASE64_MARKER.length;
      var base64 = dataURI.substring(base64Index);
      var raw = window.atob(base64);
      var rawLength = raw.length;
      var array = new Uint8Array(new ArrayBuffer(rawLength));

      for (var i = 0; i < rawLength; i++) {
        array[i] = raw.charCodeAt(i);
      }
      return array;
    }


    function downloadAttach() {
      return fetch(PDFContentBase64).then((response) => {
        return response.blob().then((blob) => {
          var reader = new FileReader();
          reader.readAsDataURL(blob);
          reader.onloadend = function () {
            var base64data = reader.result;
            const downloadLink = document.createElement("a");
            downloadLink.href = base64data;
            downloadLink.download = PDFFileName;
            downloadLink.click();

          }
          return null;
        }).catch((err) => {
          //  console.log(err);
        });
      });

    };
  </script>
