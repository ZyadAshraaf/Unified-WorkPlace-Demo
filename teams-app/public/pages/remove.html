<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remove Tab — Unified Workspace</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/theme.css">

  <style>
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .remove-card {
      background: white;
      border-radius: 12px;
      padding: 32px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .remove-card i.icon {
      font-size: 40px;
      color: var(--color-warning);
      margin-bottom: 16px;
    }

    .remove-card h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .remove-card p {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 0;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       TAB REMOVAL PAGE

       Shown by Teams when a user removes this tab from a channel.
       This is optional but provides a clean UX. No data is deleted
       since the app is stateless (all data lives in the main backend).
       ============================================================ -->
  <div class="remove-card">
    <i class="bi bi-exclamation-triangle icon"></i>
    <h3>Remove Unified Workspace Tab</h3>
    <p>This will remove the tab from this channel. Your data is not affected — you can re-add the tab at any time.</p>
  </div>

  <!-- Microsoft Teams JS SDK -->
  <script src="https://res.cdn.office.net/teams-js/2.31.1/js/MicrosoftTeams.min.js"
    crossorigin="anonymous"></script>

  <script>
    (async () => {
      try {
        await microsoftTeams.app.initialize();

        // Register the removal handler
        microsoftTeams.pages.config.registerOnRemoveHandler((removeEvent) => {
          /*
           * FUTURE: If the app stores any per-tab data in the backend,
           * this is where you would clean it up:
           *
           *   await API.del(`/api/teams/tab/${entityId}`);
           */

          // Nothing to clean up — notify Teams that removal is complete
          removeEvent.notifySuccess();
        });

        microsoftTeams.app.notifySuccess();

      } catch (err) {
        console.log('[Remove] Not in Teams context:', err.message);
      }
    })();
  </script>
</body>
</html>
